
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Moto & Co Couriers</title>
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
    </head>

    <body>
      <div id="root"></div>
      <script>
        (() => {
          const phraseReplacements = [
            ['No contracts. No minimum volumes. Just clear per-package rates (ex GST).', 'No contracts. No minimum volumes. Just clear GST-inclusive per-package rates.'],
            ['All prices exclude GST (10%). GST applied on monthly invoices.', 'All listed prices are GST inclusive.'],
            ['All prices exclude GST. GST applied on monthly invoices.', 'All listed prices are GST inclusive.'],
            ['Subtotal ex GST', 'Total GST inclusive'],
            ['GST (10%)', 'GST included'],
            ['Total inc GST', 'Invoice total'],
            ['Total (ex GST)', 'Total (GST inc)'],
            ['Delivery Priority', 'Pickup Timing'],
            ['Next available freight day — priority handling', 'Book this pickup for a specific future date'],
            ['Hold until driver heads this way — no rush', 'Book this pickup on the next scheduled run'],
            ['Date Submitted', 'Requested Pickup Date'],
            ['Time Submitted', 'Requested Pickup Time'],
            ['🔴 ASAP', 'Future Date'],
            ['ASAP', 'Future Date'],
            ['EX GST', 'GST INC'],
            ['ex GST', 'GST inc'],
          ];

          function updateTextNode(node) {
            let next = node.nodeValue;
            for (const [from, to] of phraseReplacements) next = next.split(from).join(to);
            next = next.replace(/GST inc\s*\u00b7\s*\$[\d,.]+\s*inc GST/g, 'GST inclusive');
            if (next !== node.nodeValue) node.nodeValue = next;
          }

          function updateInvoiceTotals(root) {
            root.querySelectorAll?.('.inv-tot').forEach((box) => {
              const labelColumn = box.children[0];
              const valueColumn = box.children[1];
              const labels = labelColumn ? Array.from(labelColumn.children) : [];
              const values = valueColumn ? Array.from(valueColumn.children) : [];
              const inclusiveTotal = values[0]?.textContent?.trim();

              if (labels[0]) labels[0].textContent = 'Total GST inclusive';
              if (labels[1]) labels[1].textContent = 'GST included';
              if (labels[2]) labels[2].textContent = 'Invoice total';
              if (values[1]) values[1].textContent = 'Included';
              if (values[2] && inclusiveTotal) values[2].textContent = inclusiveTotal;
            });
          }

          function updatePage() {
            const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
            const nodes = [];
            while (walker.nextNode()) nodes.push(walker.currentNode);
            nodes.forEach(updateTextNode);
            updateInvoiceTotals(document);
          }

          let queued = false;
          const queueUpdate = () => {
            if (queued) return;
            queued = true;
            requestAnimationFrame(() => {
              queued = false;
              updatePage();
            });
          };

          document.addEventListener('DOMContentLoaded', queueUpdate);
          new MutationObserver(queueUpdate).observe(document.documentElement, { childList: true, subtree: true, characterData: true });
        })();
      </script>
      <script>
        (() => {
          const originalFetch = window.fetch.bind(window);

          function requestUrl(input) {
            if (typeof input === 'string') return input;
            if (input instanceof URL) return input.toString();
            return input?.url || '';
          }

          function requestMethod(input, init) {
            return String(init?.method || input?.method || 'GET').toUpperCase();
          }

          async function requestBody(input, init) {
            if (typeof init?.body === 'string') return init.body;
            if (init?.body instanceof Blob) return init.body.text();
            if (input instanceof Request) return input.clone().text();
            return '';
          }

          function isSnapshotSave(input, init) {
            return requestMethod(input, init) === 'PUT' && requestUrl(input).includes('/api/live/snapshot');
          }

          function isCrmDealCreate(input) {
            return requestUrl(input).includes('/api/live/zoho/crm/deal');
          }

          function normaliseOrderTiming(order) {
            if (!order || typeof order !== 'object') return order;
            const futureDate = order.pickupTiming === 'future-date' || order.urgency === 'asap';
            return {
              ...order,
              pickupTiming: futureDate ? 'future-date' : 'next-run',
              urgency: futureDate ? 'asap' : 'next-run',
            };
          }

          function normalisePickupTimingPayload(bodyText) {
            if (!bodyText) return bodyText;
            try {
              const payload = JSON.parse(bodyText);
              if (payload.order) payload.order = normaliseOrderTiming(payload.order);
              if (payload.store?.orders) payload.store.orders = payload.store.orders.map(normaliseOrderTiming);
              return JSON.stringify(payload);
            } catch {
              return bodyText;
            }
          }

          window.fetch = async (input, init = {}) => {
            const shouldSyncSignature = isSnapshotSave(input, init);
            const shouldNormalisePickupTiming = shouldSyncSignature || isCrmDealCreate(input);
            const bodyText = (shouldSyncSignature || shouldNormalisePickupTiming) ? await requestBody(input, init).catch(() => '') : '';
            const nextBodyText = shouldNormalisePickupTiming ? normalisePickupTimingPayload(bodyText) : bodyText;
            const nextInit = nextBodyText && typeof init?.body === 'string' ? { ...init, body: nextBodyText } : init;
            const result = await originalFetch(input, nextInit);

            if (shouldSyncSignature && result.ok && nextBodyText) {
              originalFetch('/.netlify/functions/signature-attachment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: nextBodyText,
              }).catch((error) => console.error('Could not sync signature attachment:', error));
            }

            return result;
          };
        })();
      </script>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
